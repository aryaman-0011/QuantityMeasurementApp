server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL:http://localhost:1111}
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service-auth
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**,/api/v1/auth/**,/oauth2/**,/login/**
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/v1/users/**
            - id: quantity-service
              uri: lb://QUANTITY-SERVICE
              predicates:
                - Path=/api/v1/quantities/**,/swagger-ui/**,/v3/api-docs/**
            - id: history-service
              uri: lb://HISTORY-SERVICE
              predicates:
                - Path=/api/v1/history/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${FRONTEND_URL:http://localhost:4200}
              - ${FRONTEND_URL_ALT:http://localhost:4201}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
